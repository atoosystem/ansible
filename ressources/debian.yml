- name: Configuration Debian par defaut
  hosts: all
  become: yes
  gather_facts: yes

  tasks:
    - name: Test résolution DNS
      command: nslookup atoosystem.com 86.54.11.11
        
    - name: Mise à jour cache APT
      apt:
        update_cache: yes

    - name: Installation des paquets requis
      apt: package={{ item }} state=present #present latest absent
      when: ansible_os_family == "Debian"
      with_items:
       - vim
       - curl
       - tree
       - htop
       - wget
       - rsyslog
       - git